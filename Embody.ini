; ============================================================================
;  Embody configuration — REFERENCE COPY
;  ---------------------------------------------------------------------------
;  The file the plugin actually reads/writes is:
;      Data\MCM\Settings\Embody.ini
;  (MCM Helper's own user-settings path, so the in-game MCM and the plugin
;  share ONE file). The plugin self-seeds it on first launch if it's missing,
;  so you do not have to create it by hand. This copy just documents the keys.
;
;  Three ways to configure:
;    1. In-game MCM (needs SkyUI + MCM Helper + Embody.esp) — the friendly way.
;    2. Hand-edit Data\MCM\Settings\Embody.ini — changes hot-reload live (~1s).
;    3. Tune live with the hotkeys, then press the Save key (Home) to persist.
;
;  Keys use MCM Helper's type prefixes (i = int, b = bool). All values integers.
; ============================================================================

[Anchor]
; iMode: 0 = off, 1 = root XY-pin (pitch-stable), 2 = head-pin (default)
iMode=2
; Body scale, percent (clamped 50-150). Shrink if lowered/forward feet clip the floor.
iBodyScalePct=92

[Trims]
; Per-stance body offset, game units. Fwd = forward(+)/back(-), Lat = right(+)/left(-), Up = up(+)/down(-).
iStandSheathedFwd=-14
iStandSheathedLat=0
iStandSheathedUp=-5
iStandDrawnFwd=-10
iStandDrawnLat=0
iStandDrawnUp=0
iSneakSheathedFwd=-10
iSneakSheathedLat=0
iSneakSheathedUp=0
iSneakDrawnFwd=-10
iSneakDrawnLat=0
iSneakDrawnUp=0

[Controls]
; bHotkeysEnabled: master switch for ALL tuning hotkeys below. 0 = off (default; avoids clashing with
; other mods / vanilla UI), 1 = on. INI-only users set this to 1 to use the live-tuning keys.
bHotkeysEnabled=0
; DirectInput scan codes (decimal). -1 = unbound. Defaults below = Home, Scroll Lock,
; arrows, Page Up/Down, Insert/Delete. The in-game MCM Controls page rebinds these.
iSave=199
iAnchorMode=70
iFwdPlus=200
iFwdMinus=208
iLatMinus=203
iLatPlus=205
iUpPlus=201
iUpMinus=209
iScalePlus=210
iScaleMinus=211
