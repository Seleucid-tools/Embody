; Embody — MCM Helper default settings.
; Do NOT edit this file; your changes may be lost on update. To override, copy any key into
; Data\MCM\Settings\Embody.ini (which is the file the Embody plugin actually reads and the MCM writes).
; These defaults mirror the plugin's compiled defaults exactly, so MCM-present and MCM-absent behave identically.

[Anchor]
; iMode: 0 = off, 1 = root XY-pin (pitch-stable), 2 = head-pin (default)
iMode=2
iBodyScalePct=92

[Trims]
; Per-stance body offset, game units. Fwd = forward(+)/back(-), Lat = right(+)/left(-), Up = up(+)/down(-).
iStandSheathedFwd=-14
iStandSheathedLat=0
iStandSheathedUp=-5
iStandDrawnFwd=-10
iStandDrawnLat=0
iStandDrawnUp=0
iSneakSheathedFwd=-10
iSneakSheathedLat=0
iSneakSheathedUp=0
iSneakDrawnFwd=-10
iSneakDrawnLat=0
iSneakDrawnUp=0

[Controls]
; bHotkeysEnabled: master switch for ALL tuning hotkeys. 0 = off (default, avoids clashing with other mods). 1 = on.
bHotkeysEnabled=0
; DirectInput scan codes (decimal). -1 = unbound. Defaults: Home, Scroll Lock, arrows, Page Up/Down, Insert/Delete.
iSave=199
iAnchorMode=70
iFwdPlus=200
iFwdMinus=208
iLatMinus=203
iLatPlus=205
iUpPlus=201
iUpMinus=209
iScalePlus=210
iScaleMinus=211
